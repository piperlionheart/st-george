<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>St. George 2050 — Strategy 1 Key Metric</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#D9DCE6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{width:100%;max-width:780px;background:#fff;border-radius:18px;box-shadow:0 4px 24px rgba(0,0,0,0.12);overflow:hidden}
.card-head{background:#1B2D55;padding:16px 24px}
.s-num{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#8DA3C7;margin-bottom:2px}
.s-title{font-size:14px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:4px}
.metric-label{font-size:10px;color:#A8BBDA;line-height:1.4}
.metric-name{font-size:11px;font-weight:700;color:#D4A017;margin-top:2px}
.card-body{padding:24px}
.chart-wrap{position:relative;height:320px}
.legend-row{display:flex;gap:20px;margin-top:16px;padding-top:14px;border-top:1px solid #EAECEF;justify-content:center}
.leg{display:flex;align-items:center;gap:7px;font-size:11px;color:#4B5563}
.leg-line{width:28px;height:3px;border-radius:2px;flex-shrink:0}
.leg-line.goal{background:#1B2D55}
.leg-line.actual{background:#D4A017}
.leg-line.actual-dash{background:repeating-linear-gradient(to right,#D4A017 0,#D4A017 6px,transparent 6px,transparent 10px)}
.footer{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;border-top:1px solid #EAECEF;background:#F8FAFC}
.footnote{font-size:9.5px;color:#9CA3AF;font-style:italic}
.save-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:10.5px;font-weight:700;cursor:pointer;border:1.5px solid #D1D5DB;background:#fff;color:#4B5563;transition:all .15s}
.save-btn:hover{border-color:#1B2D55;color:#1B2D55}
.save-btn svg{width:13px;height:13px}
</style>
</head>
<body>
<div class="card">
  <div class="card-head">
    <div class="s-num">Strategy 1</div>
    <div class="s-title">Conduct Targeted Planning Studies and Update Development Code</div>
    <div class="metric-label">Key Performance Metric</div>
    <div class="metric-name">Share of New Development Located in Designated Centers &amp; Corridors (%)</div>
  </div>

  <div class="card-body">
    <div class="chart-wrap">
      <canvas id="metricChart"></canvas>
    </div>
    <div class="legend-row">
      <div class="leg"><div class="leg-line goal"></div>City Goal</div>
      <div class="leg"><div class="leg-line actual"></div>Actual</div>
    </div>
  </div>

  <div class="footer">
    <span class="footnote">Updated annually by City of St. George Staff</span>
    <button class="save-btn" onclick="saveView()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Save as View
    </button>
  </div>
</div>

<script>
// --- Data ---
var YEARS = [];
for(var y=2025;y<=2050;y++) YEARS.push(y);

// Goal trajectory — interpolated from 5-year benchmarks
var GOAL_MARKS = {2025:10,2030:25,2035:40,2040:55,2045:70,2050:80};
function interpGoal(year){
  var keys=[2025,2030,2035,2040,2045,2050];
  for(var i=0;i<keys.length-1;i++){
    var y0=keys[i],y1=keys[i+1];
    if(year>=y0&&year<=y1){
      var t=(year-y0)/(y1-y0);
      return Math.round((GOAL_MARKS[y0]+t*(GOAL_MARKS[y1]-GOAL_MARKS[y0]))*10)/10;
    }
  }
  return 80;
}
var goalData = YEARS.map(interpGoal);

// Actual — only known years (2025 baseline, 2026 first full year)
var actualData = YEARS.map(function(y){
  if(y===2025) return 8;
  if(y===2026) return 11;
  return null;
});

// --- Chart ---
var ctx = document.getElementById('metricChart').getContext('2d');
var chart = new Chart(ctx,{
  type:'line',
  data:{
    labels: YEARS,
    datasets:[
      {
        label:'City Goal',
        data: goalData,
        borderColor:'#1B2D55',
        backgroundColor:'rgba(27,45,85,0.06)',
        borderWidth:2.5,
        pointRadius: YEARS.map(function(y){return (y%5===0)?5:0;}),
        pointHoverRadius:6,
        pointBackgroundColor:'#1B2D55',
        tension:0.35,
        fill:true,
        order:2
      },
      {
        label:'Actual',
        data: actualData,
        borderColor:'#D4A017',
        backgroundColor:'transparent',
        borderWidth:2.5,
        pointRadius:6,
        pointHoverRadius:8,
        pointBackgroundColor:'#D4A017',
        pointBorderColor:'#fff',
        pointBorderWidth:2,
        tension:0,
        spanGaps:false,
        order:1
      }
    ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:'rgba(27,45,85,0.92)',
        titleColor:'#A8BBDA',
        bodyColor:'#fff',
        padding:10,
        callbacks:{
          title:function(items){return 'Year '+items[0].label;},
          label:function(item){
            var v=item.raw;
            if(v===null||v===undefined) return item.dataset.label+': —';
            return item.dataset.label+': '+v+'%';
          }
        }
      }
    },
    scales:{
      x:{
        grid:{color:'rgba(0,0,0,0.05)'},
        ticks:{
          font:{size:10,family:"'Segoe UI',Arial,sans-serif"},
          color:'#9CA3AF',
          maxTicksLimit:14,
          callback:function(val,i){
            var y=YEARS[i];
            return (y%5===0)?y:'';
          }
        }
      },
      y:{
        min:0,
        max:100,
        grid:{color:'rgba(0,0,0,0.05)'},
        ticks:{
          font:{size:10,family:"'Segoe UI',Arial,sans-serif"},
          color:'#9CA3AF',
          callback:function(v){return v+'%';}
        },
        title:{
          display:true,
          text:'Share of New Development (%)',
          font:{size:10,family:"'Segoe UI',Arial,sans-serif"},
          color:'#6B7280'
        }
      }
    }
  }
});

// --- Save as View ---
function saveView(){
  var goalJson=JSON.stringify(goalData);
  var actualJson=JSON.stringify(actualData);
  var yearsJson=JSON.stringify(YEARS);

  var html='<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8"/>\n'
    +'<meta name="viewport" content="width=device-width,initial-scale=1.0"/>\n'
    +'<title>St. George 2050 — Strategy 1 Key Metric</title>\n'
    +'<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>\n'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#D9DCE6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}.card{width:100%;max-width:780px;background:#fff;border-radius:18px;box-shadow:0 4px 24px rgba(0,0,0,0.12);overflow:hidden}.card-head{background:#1B2D55;padding:16px 24px}.s-num{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#8DA3C7;margin-bottom:2px}.s-title{font-size:14px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:4px}.metric-label{font-size:10px;color:#A8BBDA}.metric-name{font-size:11px;font-weight:700;color:#D4A017;margin-top:2px}.card-body{padding:24px}.chart-wrap{position:relative;height:320px}.legend-row{display:flex;gap:20px;margin-top:16px;padding-top:14px;border-top:1px solid #EAECEF;justify-content:center}.leg{display:flex;align-items:center;gap:7px;font-size:11px;color:#4B5563}.leg-line{width:28px;height:3px;border-radius:2px}.leg-line.goal{background:#1B2D55}.leg-line.actual{background:#D4A017}.footer{padding:10px 24px;border-top:1px solid #EAECEF;background:#F8FAFC}.footnote{font-size:9.5px;color:#9CA3AF;font-style:italic}<\/style>\n'
    +'</head>\n<body>\n'
    +'<div class="card">\n'
    +'<div class="card-head">'
    +'<div class="s-num">Strategy 1</div>'
    +'<div class="s-title">Conduct Targeted Planning Studies and Update Development Code</div>'
    +'<div class="metric-label">Key Performance Metric</div>'
    +'<div class="metric-name">Share of New Development Located in Designated Centers &amp; Corridors (%)</div>'
    +'</div>\n'
    +'<div class="card-body">'
    +'<div class="chart-wrap"><canvas id="mc"></canvas></div>'
    +'<div class="legend-row">'
    +'<div class="leg"><div class="leg-line goal"></div>City Goal</div>'
    +'<div class="leg"><div class="leg-line actual"></div>Actual</div>'
    +'</div></div>\n'
    +'<div class="footer"><span class="footnote">Updated annually by City of St. George Staff</span></div>\n'
    +'</div>\n'
    +'<script>\n'
    +'var YEARS='+yearsJson+';\n'
    +'var goalData='+goalJson+';\n'
    +'var actualData='+actualJson+';\n'
    +'var ctx=document.getElementById("mc").getContext("2d");\n'
    +'new Chart(ctx,{type:"line",data:{labels:YEARS,datasets:[{label:"City Goal",data:goalData,borderColor:"#1B2D55",backgroundColor:"rgba(27,45,85,0.06)",borderWidth:2.5,pointRadius:YEARS.map(function(y){return y%5===0?5:0;}),pointBackgroundColor:"#1B2D55",tension:0.35,fill:true,order:2},{label:"Actual",data:actualData,borderColor:"#D4A017",backgroundColor:"transparent",borderWidth:2.5,pointRadius:6,pointBackgroundColor:"#D4A017",pointBorderColor:"#fff",pointBorderWidth:2,tension:0,spanGaps:false,order:1}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(27,45,85,0.92)",titleColor:"#A8BBDA",bodyColor:"#fff",padding:10,callbacks:{title:function(i){return "Year "+i[0].label;},label:function(i){var v=i.raw;if(v===null||v===undefined)return i.dataset.label+": —";return i.dataset.label+": "+v+"%";}}}},scales:{x:{grid:{color:"rgba(0,0,0,0.05)"},ticks:{font:{size:10},color:"#9CA3AF",maxTicksLimit:14,callback:function(v,i){var y=YEARS[i];return y%5===0?y:""}}},y:{min:0,max:100,grid:{color:"rgba(0,0,0,0.05)"},ticks:{font:{size:10},color:"#9CA3AF",callback:function(v){return v+"%"}},title:{display:true,text:"Share of New Development (%)",font:{size:10},color:"#6B7280"}}}}});\n'
    +'<\/script>\n</body>\n</html>';

  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='strategy-1-metric-view.html';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
